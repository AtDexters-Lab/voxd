name: voxd
arch: ${ARCH}
version: ${VERSION}
release: "1"
section: utils
priority: optional
license: MIT
maintainer: "Jakov Ivkovic <jakov.iv@proton.me>"
homepage: "https://github.com/jakovius/voxd"
description: "VOXD - Gemma E4B voice typing on Linux"
vendor: "VOXD"

contents:
  - src: ./src
    dst: /opt/voxd/src
  - src: pyproject.toml
    dst: /opt/voxd/pyproject.toml
    file_info:
      mode: 0644
  - src: packaging/voxd.wrapper
    dst: /usr/bin/voxd
    file_info:
      mode: 0755
  - src: packaging/99-uinput.rules
    dst: /etc/udev/rules.d/99-uinput.rules
    file_info:
      mode: 0644
  - src: packaging/ydotoold.service
    dst: /usr/lib/systemd/user/ydotoold.service
    file_info:
      mode: 0644
  - src: packaging/voxd-tray.service
    dst: /usr/lib/systemd/user/voxd-tray.service
    file_info:
      mode: 0644
overrides:
  deb:
    depends:
      - ydotool
      - ydotoold
      - wl-clipboard
      - python3-platformdirs
      - python3-venv
      - libportaudio2
      - python3-numpy
      - python3-requests
      - python3-yaml
      - python3-pyperclip
      - python3-pyqt6
    recommends:
      - pipewire-pulse | pulseaudio
  rpm:
    depends:
      - ydotool
      - wl-clipboard
      - python3-platformdirs
      - python3-virtualenv
      - portaudio
      - python3-numpy
      - python3-requests
      - python3-PyYAML
      - python3-pyperclip
    suggests:
      - python3-qt6
      - pipewire-pulseaudio
  archlinux:
    depends:
      - wl-clipboard
      - python-platformdirs
      - python-virtualenv
      - portaudio
      - python-numpy
      - python-requests
      - python-yaml
      - python-pyperclip
      - python-pyqt6
      - ydotool

scripts:
  postinstall: packaging/postinstall.sh
  postremove: packaging/postremove.sh
