verbosity: false
autostart: false

typing_delay: 1
typing_start_delay: 0.15
append_trailing_space: true

record_chunk_seconds: 300
audio_prefer_pulse: true
audio_input_device: ""
mic_autoset_enabled: true
mic_autoset_level: 0.45

gemma_server_url: http://localhost:9292
gemma_model: gemma-e4b
gemma_timeout: 300
gemma_segment_seconds: 25
gemma_segment_overlap_seconds: 1
gemma_max_tokens: 1024
gemma_transcription_prompt: >-
  Transcribe the following speech exactly as spoken. Do not translate it. For Hindi
  or mixed Hindi-English speech, write Hindi words in natural Latin/Roman script
  (Hinglish), never Devanagari. Preserve English words, names, numbers, and intended
  capitalization. Add natural punctuation from pauses and intonation: end complete
  thoughts with periods, use question marks for questions, and add commas where
  natural. Do not paraphrase or change the spoken wording. Return only the
  transcription, with no commentary.
